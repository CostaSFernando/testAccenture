<div class="panel form-card">
  <div class="panel-header" style="padding: 0 0 18px; border-bottom: 0;">
    <div>
      <h3>Novo fornecedor</h3>
      <p>Campos dinâmicos para CPF/CNPJ.</p>
    </div>
  </div>

  <form class="form-section" [formGroup]="formSupplier">
    <div class="row-2">
      <div class="field-group">
        <label>Tipo</label>
        <select [formControlName]="'documentType'">
          <option>CPF</option>
          <option>CNPJ</option>
        </select>
      </div>
      <div class="field-group">
        <label>Documento</label>
        <input type="text" placeholder="000.000.000-00" [formControlName]="'document'" (keyup)="applyCpfOrCnpjMask(formSupplier.controls['document'])"/>
      </div>
    </div>

    <div class="field-group">
      <label>Nome</label>
      <input type="text" placeholder="Nome do fornecedor" [formControlName]="'name'"/>
    </div>

    <div class="field-group">
      <label>E-mail</label>
      <input type="email" placeholder="email@dominio.com" [formControlName]="'email'"/>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>CEP</label>
        <input type="text" placeholder="00000-000" [formControlName]="'zipCode'" (keyup)="updateStateZipCode(validCEP); applyCepMask(formSupplier.controls['zipCode'])"/>
      </div>
      <div class="field-group">
        <label>RG</label>
        <input type="text" placeholder="00.000.000-0" [formControlName]="'rg'" (keyup)="applyRgMask(formSupplier.controls['rg'])"/>
      </div>
    </div>
    <div class="row-2">
      <div class="field-group">
        <label>Cidade</label>
        <input type="text" placeholder="Cidade" [formControlName]="'city'"/>
      </div>
      <div class="field-group">
        <label>Estado</label>
        <input type="text" placeholder="Estado" [formControlName]="'state'"/>
      </div>
    </div>

    <div class="field-group">
      <label>Data de nascimento</label>
      <input type="date" [formControlName]="'birthDate'"/>
    </div>

    <div class="form-footer">
      <button type="button" class="btn btn-secondary">Cancelar</button>
      <button type="button" class="btn btn-primary" (click)="saveSupplier()">{{ validCEP() ? 'Salvar' : 'Validar CEP' }}</button>
    </div>
  </form>
</div>
