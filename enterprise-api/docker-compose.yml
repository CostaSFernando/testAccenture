services:
  postgres:
    image: postgres:16
    container_name: enterprise_api_postgres
    restart: always
    environment:
      POSTGRES_DB: enterprise_api
      POSTGRES_USER: enterprise_user
      POSTGRES_PASSWORD: enterprise_password
    ports:
      - "5432:5432"
    volumes:
      - enterprise_api_data:/var/lib/postgresql/data
    networks:
      - enterprise_api_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: enterprise_api_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - enterprise_api_network

volumes:
  enterprise_api_data:

networks:
  enterprise_api_network:
    driver: bridge